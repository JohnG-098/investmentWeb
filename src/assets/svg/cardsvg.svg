<svg
  width="320"
  height="420"
  viewBox="0 0 320 420"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7d27a"/>
      <stop offset="50%" stop-color="#caa24d"/>
      <stop offset="100%" stop-color="#f7d27a"/>
    </linearGradient>

    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b0f16"/>
      <stop offset="100%" stop-color="#151a22"/>
    </linearGradient>
  </defs>

  <!-- Card Background -->
  <rect
    x="2"
    y="2"
    rx="16"
    ry="16"
    width="316"
    height="416"
    fill="url(#cardBg)"
    stroke="url(#goldBorder)"
    stroke-width="3"
  />

  <!-- Decorative Left Lines -->
  <polyline
    points="0,60 90,0"
    stroke="url(#goldBorder)"
    stroke-width="2"
    fill="none"
  />

  <polyline
    points="0,260 120,200"
    stroke="url(#goldBorder)"
    stroke-width="2"
    fill="none"
  />

</svg>